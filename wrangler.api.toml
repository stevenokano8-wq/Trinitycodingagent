name = "sovereign-agent-api"
main = "server/worker.ts"
compatibility_date = "2026-07-11"
compatibility_flags = ["nodejs_compat"]

# Wrangler 4 inherits the [assets] section from wrangler.toml (the frontend
# config) even when deployed with --config wrangler.api.toml.  Without this
# override, Cloudflare's Static Assets layer intercepts every request before
# Hono runs (run_worker_first defaults to false) and returns "Not found" for
# any path that has no matching static file — breaking all API routes.
# Setting run_worker_first = true ensures Hono always executes first.
[assets]
run_worker_first = true

# Custom domain for the production API. Cloudflare issues/manages the
# certificate automatically once the zone (trinityuniverse.org) is active.
[[routes]]
pattern = "agent-api.trinityuniverse.org"
custom_domain = true

# Native Cloudflare persistence: D1 (SQL) replaces Postgres, Workers KV
# replaces Upstash Redis. Both bindings are account-native — no external
# database provider or connection string needed.
[[d1_databases]]
binding = "DB"
database_name = "sovereign-agent-db"
database_id = "0961b84e-c89a-43af-96ef-022089e8448e"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "b3301c5ec88a409d964b4303e880618b"

# Cloudflare Workers AI binding — handles task planning / division of labor.
# Gemini handles code synthesis; CF AI handles lightweight planning.
[ai]
binding = "AI"

# Secrets (GEMINI_API_KEY, GITHUB_TOKEN, GITHUB_REPO_URL) are set via
# `wrangler secret put <NAME> --config wrangler.api.toml` or the Cloudflare
# dashboard -- never committed here.

# IMPORTANT: Migrations are ADDITIVE. Never rename or remove a tag that
# Cloudflare has already applied -- Wrangler will try to re-apply everything
# from scratch and fail with code 10074 if a class was already deleted.
# v2 applied by run #19: removed ProjectTools
# v3 applied by run #20: removed ProjectTools + AgentSession (both legacy DOs gone)
[[migrations]]
tag = "v2_delete_project_tools"
new_classes = []
deleted_classes = ["ProjectTools"]

[[migrations]]
tag = "v3_delete_legacy_durable_objects"
new_classes = []
deleted_classes = ["ProjectTools", "AgentSession"]
