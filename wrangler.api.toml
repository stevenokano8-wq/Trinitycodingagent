name = "sovereign-agent-api"
main = "src/index.ts"
compatibility_date = "2026-07-11"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "agent-api.trinityuniverse.org"
custom_domain = true

# ── Persistence ───────────────────────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "sovereign-agent-db"
database_id = "0961b84e-c89a-43af-96ef-022089e8448e"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "b3301c5ec88a409d964b4303e880618b"

[[r2_buckets]]
binding     = "FILES_R2"
bucket_name = "sovereign-master-bucket"

# ── Workers AI (with Cloudflare AI Gateway for observability/caching) ─────────
# Models:
#   Reasoning / planning  → @cf/deepseek-ai/deepseek-r1-distill-llama-70b
#   Code generation       → @cf/meta/llama-3.3-70b-instruct-fp8-fast
#   Fast / classify       → @cf/meta/llama-3.1-8b-instruct-fast
#   Vision / screenshot   → @cf/meta/llama-3.2-11b-vision-instruct
[ai]
binding = "AI"

# ── Vectorize (semantic search / RAG memory) ──────────────────────────────────
[[vectorize]]
binding    = "VECTORIZE"
index_name = "sovereign-search"

# ── Queue (background task processing) ───────────────────────────────────────
[[queues.producers]]
binding    = "TASK_QUEUE"
queue      = "sovereign-lobe-queue"

[[queues.consumers]]
queue                     = "sovereign-lobe-queue"
max_batch_size            = 10
max_batch_timeout         = 5
max_retries               = 3
dead_letter_queue         = "sovereign-lobe-queue"

# ── Browser Rendering (@cloudflare/puppeteer) ─────────────────────────────────
[browser]
binding = "BROWSER"

# ── Cloudflare Sandbox (code execution via @cloudflare/sandbox) ───────────────
# Uncomment when Containers exits beta on your account
# [[containers]]
# binding    = "SANDBOX"
# image      = "ghcr.io/cloudflare/sandbox:latest"
# max_instances = 5

# ── Durable Objects ───────────────────────────────────────────────────────────

[[durable_objects.bindings]]
name = "SESSION_WORKSPACE"
class_name = "SessionWorkspace"

[[durable_objects.bindings]]
name = "FILE_EXPLORER"
class_name = "FileExplorer"

[[durable_objects.bindings]]
name = "WEBSOCKET_MANAGER"
class_name = "WebSocketManager"

[[durable_objects.bindings]]
name = "WORKFLOW_ENGINE"
class_name = "WorkflowEngine"

[[durable_objects.bindings]]
name = "THINK_AGENT"
class_name = "ThinkAgent"

[[durable_objects.bindings]]
name = "SUB_AGENT_ORCHESTRATOR"
class_name = "SubAgentOrchestrator"

[[durable_objects.bindings]]
name = "USER_PROFILE"
class_name = "UserProfile"

[[durable_objects.bindings]]
name = "WORKSPACE_REGISTRY"
class_name = "WorkspaceRegistry"

[[durable_objects.bindings]]
name = "AI_GATEWAY"
class_name = "AiGateway"

[[durable_objects.bindings]]
name = "LIVE_PREVIEW"
class_name = "LivePreview"

[[durable_objects.bindings]]
name = "BROWSER_RUN"
class_name = "BrowserRun"

# ── Migrations ────────────────────────────────────────────────────────────────
# DO NOT remove or reorder applied migration tags — they are ADDITIVE.

[[migrations]]
tag = "v2_delete_project_tools"
new_classes     = []
deleted_classes = ["ProjectTools"]

[[migrations]]
tag = "v3_delete_legacy_durable_objects"
new_classes     = []
deleted_classes = ["ProjectTools", "AgentSession"]

[[migrations]]
tag = "v4_add_autonomous_agent_durable_objects"
new_classes = [
  "SessionWorkspace", "FileExplorer", "WebSocketManager",
  "WorkflowEngine",   "ThinkAgent",   "SubAgentOrchestrator",
  "UserProfile",      "WorkspaceRegistry", "AiGateway",
  "LivePreview",      "BrowserRun"
]

[[migrations]]
tag = "v5_remove_sandbox_stub"
new_classes     = []
deleted_classes = ["Sandbox"]
