name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Upgrade npm
        # Works around a known npm 10.8.x bug ("Exit handler never called!")
        # that intermittently crashes `npm ci` on installs with platform-
        # specific optional deps (wrangler/esbuild/workerd binaries).
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build frontend
        run: npx vite build

      - name: Deploy frontend worker (sovereign-agent)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml

      - name: Deploy API worker (sovereign-agent-api)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.api.toml

      - name: Seed GEMINI_API_KEY into sovereign-agent-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: echo "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY --config wrangler.api.toml

      # Re-pin the custom domain → worker binding after every deploy.
      # Cloudflare drops this binding on each fresh wrangler deploy, so we
      # must re-create it via the Workers Domains API to keep
      # agent-api.trinityuniverse.org routed to sovereign-agent-api.
      - name: Re-bind sovereign-agent-api custom domain
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/domains" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"service":"sovereign-agent-api","zone_id":"3b68b597a92d1e970af9aab1d0f6e91e","hostname":"agent-api.trinityuniverse.org","environment":"production"}' \
            | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.exit(d.success ? 0 : 1)"
          echo "✅ Custom domain binding restored: agent-api.trinityuniverse.org → sovereign-agent-api"
